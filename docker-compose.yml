version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: handyman-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: handyman
      POSTGRES_USER: handyman
      POSTGRES_PASSWORD: handyman_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U handyman']
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: handyman-api
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://handyman:handyman_dev@db:5432/handyman?schema=public
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_EXPIRES_IN: 8h
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - backend_uploads:/app/uploads

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: handyman-ui
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_APP_NAME: HandyMan
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
